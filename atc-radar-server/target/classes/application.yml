server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: atc-radar-server
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 0

atc:
  radar:
    udp:
      port: ${RADAR_UDP_PORT:8600}
      buffer-size: 65535
    sse:
      heartbeat-interval: 15000
    track:
      ttl-seconds: 300
  simulator:
    enabled: true
  collision:
    enabled: true
    scan-interval-ms: 1000
    prediction-window-seconds: 120
    time-step-seconds: 5
    horizontal-threshold-meters: 9260
    vertical-threshold-meters: 304.8
    tca-horizontal-warning-meters: 18520
    tca-vertical-warning-meters: 457.2
    alert-ttl-seconds: 60
    min-separation-seconds: 30

logging:
  level:
    com.atc.radar: DEBUG
    org.springframework.data.redis: INFO
