version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: atc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - atc-network

  atc-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: atc-radar-server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8600:8600/udp"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RADAR_UDP_PORT=8600
    networks:
      - atc-network

  atc-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: atc-radar-frontend
    restart: unless-stopped
    depends_on:
      - atc-server
    ports:
      - "80:80"
    networks:
      - atc-network

volumes:
  redis-data:

networks:
  atc-network:
    driver: bridge
